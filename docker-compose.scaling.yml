version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"

  app1:
    build: .
    env_file:
      - .env
    environment:
      PROCESS_ROLE: web
      RUN_SCHEDULED_JOBS: "false"
      APP_WORKERS: "4"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  app2:
    build: .
    env_file:
      - .env
    environment:
      PROCESS_ROLE: web
      RUN_SCHEDULED_JOBS: "false"
      APP_WORKERS: "4"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build: .
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    environment:
      PROCESS_ROLE: worker
      RUN_SCHEDULED_JOBS: "true"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app1
      - app2
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
